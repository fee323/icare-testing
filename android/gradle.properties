org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
# Kotlin incremental compilation disabled - causes cross-drive path errors on Windows
# when Pub cache is on C:\ and project is on D:\
kotlin.incremental=false
kotlin.incremental.java=false
kotlin.incremental.multiplatform=false
# Gradle daemon and parallel builds
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
